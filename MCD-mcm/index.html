<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCD i mcm • Aprenent visual</title>
    <link rel="stylesheet" href="style.css">
    <meta name="color-scheme" content="light">
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <img src="assets/logo.svg" alt="Logo" class="logo">
            <h1>MCD i mcm</h1>
        </div>
        <p class="tagline">Una manera visual i divertida d’aprendre</p>
    </header>
    <main>
        <section class="settings">
            <div class="group">
                <label for="mode">Mode</label>
                <select id="mode" aria-label="Selector de mode">
                    <option value="free">Lliure</option>
                    <option value="practice">Pràctica</option>
                    <option value="problems">Problemes</option>
                </select>
            </div>
            <div class="group level-selector hidden">
                <label for="level">Nivell</label>
                <select id="level" aria-label="Selector de nivell">
                    <option value="easy">Fàcil</option>
                    <option value="medium">Mitjà</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>
            <button id="start-btn" class="primary">Començar</button>
            <button id="reset-btn" class="ghost" title="Reinicia">Reinicia</button>
        </section>

        <section class="problem-container hidden" aria-live="polite">
            <p id="problem-text"></p>
        </section>

        <section class="free-mode-container hidden">
            <input type="number" class="number-input" inputmode="numeric" placeholder="Nombre 1" aria-label="Nombre 1">
            <input type="number" class="number-input" inputmode="numeric" placeholder="Nombre 2" aria-label="Nombre 2">
            <input type="number" class="number-input" inputmode="numeric" placeholder="Nombre 3" aria-label="Nombre 3">
            <input type="number" class="number-input" inputmode="numeric" placeholder="Nombre 4" aria-label="Nombre 4">
        </section>

        <nav class="view-tabs hidden" role="tablist" aria-label="Vistes d'aprenentatge">
            <button class="tab active" role="tab" aria-selected="true" data-target="#factor-view">Descomposició</button>
            <button class="tab" role="tab" aria-selected="false" data-target="#euclid-view">Algorisme d’Euclides</button>
            <button class="tab" role="tab" aria-selected="false" data-target="#venn-view">Venn (2–3 nombres)</button>
        </nav>

        <section id="factor-view" class="card view">
            <div class="numbers-container" aria-live="polite">
                <!-- Aquí es generaran les taules de descomposició -->
            </div>
            <div class="legend">
                <span class="chip prime2">2</span>
                <span class="chip prime3">3</span>
                <span class="chip prime5">5</span>
                <span class="chip prime7">7</span>
                <span class="chip prime11">11</span>
                <span class="chip">…</span>
            </div>
        </section>

        <section id="euclid-view" class="card view hidden" aria-live="polite">
            <h2>Algorisme d’Euclides</h2>
            <div id="euclid-steps" class="euclid-steps"></div>
            <div class="euclid-controls">
                <button id="euclid-step" class="secondary">Pas a pas</button>
                <button id="euclid-play" class="secondary">Reprodueix</button>
                <button id="euclid-reset" class="ghost">Reinicia passos</button>
            </div>
        </section>

        <section id="venn-view" class="card view hidden" aria-live="polite">
            <h2>Diagrama de Venn</h2>
            <svg id="venn-svg" viewBox="0 0 600 300" class="venn-svg" aria-label="Diagrama de Venn"></svg>
            <p class="hint small">Per a 4 nombres, el diagrama de Venn no es mostra.</p>
        </section>

        <section class="results-container card">
            <div class="results-header">
                <h2>Resultats</h2>
                <button id="calculate-btn" class="accent">Calcular</button>
            </div>
            <div class="results-grid">
                <div class="result item">
                    <div class="label">MCD</div>
                    <div class="value" id="mcd-input" aria-live="polite">—</div>
                </div>
                <div class="result item">
                    <div class="label">mcm</div>
                    <div class="value" id="mcm-input" aria-live="polite">—</div>
                </div>
            </div>
            <div id="factor-summary" class="factor-summary"></div>
        </section>
    </main>
    <footer>
        <p>Aplicació creada per Felip Sarroca amb l’assistència de la IA</p>
        <p>
            <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/deed.ca" target="_blank" rel="noopener">
                <img src="assets/cc-by-nc-sa.svg" alt="Llicència CC BY-NC-SA 4.0" class="license-icon">
                Obra sota llicència CC BY-NC-SA 4.0
            </a>
        </p>
    </footer>
    <script src="script.js"></script>
    <script>
        // Canvi de pestanyes (vistes)
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.tab');
            if (!btn) return;
            const tabs = [...document.querySelectorAll('.tab')];
            tabs.forEach(t => {
                t.classList.toggle('active', t === btn);
                t.setAttribute('aria-selected', t === btn ? 'true' : 'false');
            });
            const target = document.querySelector(btn.dataset.target);
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            if (target) target.classList.remove('hidden');
        });
    </script>
    
</body>
</html>
