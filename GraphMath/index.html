<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <title>Graficadora</title>
    <script>
      (function() {
        const originalWarn = console.warn;
        console.warn = function(...args) {
          if (typeof args[0] === "string" && args[0].includes("cdn.tailwindcss.com should not be used in production")) {
            return;
          }
          originalWarn.apply(console, args);
        };
      })();
    </script>
    <script src="./vendor/tailwindcss.js"></script>
    <script src="./vendor/d3.min.js"></script>
    <link
      rel="stylesheet"
      href="./vendor/fontawesome/all.min.css"
    />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        svg: {
          fontCache: "local"
        }
      };
    </script>
    <script
      type="text/javascript"
      id="MathJax-script"
      async
      src="./vendor/tex-svg.js"
    ></script>
    <script type="importmap">
      {
        "imports": {
          "react": "./vendor/react/react.js",
          "react/jsx-runtime": "./vendor/react/react-jsx-runtime.js",
          "react-dom/client": "./vendor/react/react-dom-client.js"
        }
      }
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
